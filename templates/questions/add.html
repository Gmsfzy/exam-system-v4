<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>添加题目</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
    {% include 'layout/header.html' %}
    <div class="container mt-4">
        <h2>添加题目</h2>
        <form method="POST">
            <div class="form-group">
                <label>题目内容</label>
                <textarea class="form-control" name="content" required></textarea>
            </div>
            <div class="form-group">
                <label>选项（JSON格式，选择题使用）</label>
                <textarea class="form-control" name="options" placeholder='["选项A", "选项B", "选项C", "选项D"]'></textarea>
            </div>
            <div class="form-group">
                <label>正确答案</label>
                <input type="text" class="form-control" name="answer" required>
            </div>
            <div class="form-group">
                <label>答案解析</label>
                <textarea class="form-control" name="analysis"></textarea>
            </div>
            <div class="form-group">
                <label>专业</label>
                <select class="form-control" name="major_id" required>
                    {% for major in majors %}
                        <option value="{{ major.id }}">{{ major.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>题型</label>
                <select class="form-control" name="type" required>
                    <option value="single_choice">单选题</option>
                    <option value="multiple_choice">多选题</option>
                    <option value="fill_blank">填空题</option>
                    <option value="true_false">判断题</option>
                    <option value="short_answer">问答题</option>
                    <option value="programming">编程题</option>
                    <option value="application">应用题</option>
                    <option value="calculation">计算题</option>
                </select>
            </div>
            <div class="form-group">
                <label>难度</label>
                <select class="form-control" name="difficulty" required>
                    <option value="easy">简单</option>
                    <option value="medium">中等</option>
                    <option value="hard">困难</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary">添加</button>
            <a href="{{ url_for('question_bank.list_questions') }}" class="btn btn-secondary">取消</a>
        </form>
    </div>
</body>
</html>
