<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 在线考试系统</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card {
            background: white; border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            overflow: hidden; width: 100%; max-width: 420px;
        }
        .login-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 2rem; text-align: center; color: white;
        }
        .login-header h2 { font-weight: 700; margin: 0.5rem 0 0; font-size: 1.5rem; }
        .login-header .icon-circle {
            width: 56px; height: 56px; border-radius: 50%;
            background: rgba(255,255,255,0.2); display: flex;
            align-items: center; justify-content: center;
            margin: 0 auto; font-size: 1.5rem;
        }
        .login-body { padding: 2rem; }
        .form-control:focus { border-color: #667eea; box-shadow: 0 0 0 0.2rem rgba(102,126,234,0.25); }
        .btn-login {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none; border-radius: 50px; font-weight: 600;
            padding: 0.7rem; font-size: 1rem; transition: all 0.3s;
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(102,126,234,0.4); }
        .login-footer { background: #f8f9fa; padding: 1.2rem; text-align: center; border-radius: 0 0 16px 16px; }
        .login-footer a { color: #667eea; font-weight: 600; }
        .flash-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; min-width: 350px; }
    </style>
</head>
<body>
    <!-- Flash 消息 -->
    <div class="flash-container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="close" data-dismiss="alert"><span>&times;</span></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
    </div>

    <div class="login-card">
        <div class="login-header">
            <div class="icon-circle"><i class="fas fa-sign-in-alt"></i></div>
            <h2>登录账户</h2>
        </div>
        <div class="login-body">
            <form method="POST">
                <div class="form-group">
                    <label class="font-weight-bold text-secondary">
                        <i class="fas fa-user mr-1"></i>用户名
                    </label>
                    <div class="input-group">
                        <div class="input-group-prepend">
                            <span class="input-group-text bg-light border-right-0" style="border-radius:8px 0 0 8px">
                                <i class="fas fa-user text-muted"></i>
                            </span>
                        </div>
                        <input type="text" class="form-control border-left-0" id="username" name="username"
                               placeholder="请输入用户名" required style="border-radius:0 8px 8px 0">
                    </div>
                </div>
                <div class="form-group">
                    <label class="font-weight-bold text-secondary">
                        <i class="fas fa-lock mr-1"></i>密码
                    </label>
                    <div class="input-group">
                        <div class="input-group-prepend">
                            <span class="input-group-text bg-light border-right-0" style="border-radius:8px 0 0 8px">
                                <i class="fas fa-lock text-muted"></i>
                            </span>
                        </div>
                        <input type="password" class="form-control border-left-0" id="password" name="password"
                               placeholder="请输入密码" required style="border-radius:0 8px 8px 0">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-login btn-block mt-4">
                    <i class="fas fa-sign-in-alt mr-2"></i>登录
                </button>
            </form>
        </div>
        <div class="login-footer">
            <p class="mb-0 text-muted">还没有账户？<a href="{{ url_for('auth.register') }}">立即注册</a></p>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script>
        setTimeout(function() { $('.flash-container .alert').fadeOut(500); }, 4000);
    </script>
</body>
</html>
