<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑考试</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
    {% include 'layout/header.html' %}
    <div class="container mt-4">
        <h2>编辑考试</h2>
        <form method="POST">
            <div class="form-group">
                <label>考试名称</label>
                <input type="text" class="form-control" name="title" value="{{ exam.title }}" required>
            </div>
            <div class="form-group">
                <label>考试描述</label>
                <textarea class="form-control" name="description">{{ exam.description }}</textarea>
            </div>
            <div class="form-group">
                <label>开始时间</label>
                <input type="datetime-local" class="form-control" name="start_time" value="{{ exam.start_time.strftime('%Y-%m-%dT%H:%M') }}" required>
            </div>
            <div class="form-group">
                <label>结束时间</label>
                <input type="datetime-local" class="form-control" name="end_time" value="{{ exam.end_time.strftime('%Y-%m-%dT%H:%M') }}" required>
            </div>
            <div class="form-group">
                <label>考试时长（分钟）</label>
                <input type="number" class="form-control" name="duration" value="{{ exam.duration }}" required>
            </div>
            <button type="submit" class="btn btn-primary">保存</button>
            <a href="{{ url_for('exam.dashboard') }}" class="btn btn-secondary">取消</a>
        </form>
    </div>
</body>
</html>
